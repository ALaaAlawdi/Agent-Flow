# Agent-Flow Production Stack

version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agent-flow-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - agent_flow_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent_flow

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: agent-flow-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agent_flow

  telegram:
    build:
      context: .
      dockerfile: docker/Dockerfile.telegram
    container_name: agent-flow-telegram
    restart: unless-stopped
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agent_flow

  watchdog:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agent-flow-watchdog
    restart: unless-stopped
    command: python scripts/watchdog.py
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agent_flow

volumes:
  agent_flow_data:

networks:
  agent_flow:
    driver: bridge